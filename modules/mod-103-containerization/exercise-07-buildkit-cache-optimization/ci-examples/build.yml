# Copy to .github/workflows/build.yml in your repo.
# Demonstrates registry-backed BuildKit cache + multi-platform + HF secret.
name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write HF token secret to file
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: printf '%s' "$HF_TOKEN" > hf_token

      - name: Build + push with registry cache
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/iris-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/iris-api:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/iris-api:buildcache
          cache-to:   type=registry,ref=ghcr.io/${{ github.repository }}/iris-api:buildcache,mode=max
          secret-files: |
            "hf_token=hf_token"
