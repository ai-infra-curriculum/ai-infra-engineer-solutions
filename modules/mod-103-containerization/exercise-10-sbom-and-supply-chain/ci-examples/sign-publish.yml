# Copy to .github/workflows/sign-publish.yml in your repo.
name: sign-publish
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write     # required for cosign keyless
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/iris-api:${{ github.sha }}

      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/iris-api:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Sign image keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ghcr.io/${{ github.repository }}/iris-api
        run: cosign sign --yes "${IMG}@${DIGEST}"

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ghcr.io/${{ github.repository }}/iris-api
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate sbom.cdx.json \
            "${IMG}@${DIGEST}"
