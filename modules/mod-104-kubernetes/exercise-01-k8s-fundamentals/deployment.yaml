apiVersion: apps/v1
kind: Deployment
metadata: { name: iris-api, namespace: iris, labels: { app: iris-api } }
spec:
  replicas: 2
  selector: { matchLabels: { app: iris-api } }
  template:
    metadata:
      labels: { app: iris-api }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8000" }
    spec:
      containers:
        - name: iris-api
          image: ghcr.io/me/iris-api:0.5
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000, name: http }]
          envFrom:
            - configMapRef: { name: iris-config }
            - secretRef:    { name: iris-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
