apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: irismodels.ml.example.com
spec:
  group: ml.example.com
  scope: Namespaced
  names:
    plural: irismodels
    singular: irismodel
    kind: IrisModel
    shortNames:
      - irm
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                modelURI:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
              required:
                - modelURI
            status:
              type: object
              properties:
                phase:
                  type: string
      subresources:
        status: {}
