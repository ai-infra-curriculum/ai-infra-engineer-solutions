apiVersion: v1
kind: Service
metadata:
  name: {{ include "iris-api.fullname" . }}
  labels: {{- include "iris-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "iris-api.selectorLabels" . | nindent 4 }}
  ports:
    - { port: {{ .Values.service.port }}, targetPort: http, name: http }
