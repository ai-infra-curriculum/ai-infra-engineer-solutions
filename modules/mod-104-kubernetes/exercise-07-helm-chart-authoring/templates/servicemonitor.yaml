{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "iris-api.fullname" . }}
  labels: {{- include "iris-api.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "iris-api.selectorLabels" . | nindent 6 }}
  endpoints:
    - { port: http, path: {{ .Values.serviceMonitor.path }}, interval: {{ .Values.serviceMonitor.interval }} }
{{- end }}
