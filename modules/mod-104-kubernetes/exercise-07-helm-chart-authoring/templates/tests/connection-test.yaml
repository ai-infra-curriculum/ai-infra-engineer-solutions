apiVersion: v1
kind: Pod
metadata:
  name: {{ include "iris-api.fullname" . }}-test
  annotations: { "helm.sh/hook": test }
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8
      command: ["sh", "-c"]
      args:
        - |
          set -e
          curl -fsS http://{{ include "iris-api.fullname" . }}:{{ .Values.service.port }}/health
          echo OK
