image:
  repository: ghcr.io/me/iris-api
  tag: ""              # default to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: iris.local
  tls: false

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits:   { cpu: 500m, memory: 512Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

postgresql:
  enabled: false       # use external DB by default

env: {}
secrets: {}
