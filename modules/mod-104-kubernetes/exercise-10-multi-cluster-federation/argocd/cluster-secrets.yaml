# Register the second cluster with ArgoCD on cluster-A.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-b
  namespace: argocd
  labels: { argocd.argoproj.io/secret-type: cluster }
type: Opaque
stringData:
  name: cluster-b
  server: https://api.cluster-b.example.com
  config: |
    {
      "tlsClientConfig": { "insecure": false, "caData": "REPLACE_B64_CA" },
      "bearerToken": "REPLACE_TOKEN_FROM_KUBECONFIG"
    }
