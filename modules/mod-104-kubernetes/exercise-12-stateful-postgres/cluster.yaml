apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata: { name: pg-iris, namespace: iris }
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3
  storage:
    storageClass: gp3
    size: 100Gi
  backup:
    barmanObjectStore:
      destinationPath: s3://my-backups/pg-iris
      s3Credentials:
        accessKeyId:
          name: aws-creds
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: aws-creds
          key: SECRET_ACCESS_KEY
      wal: { compression: gzip }
      data: { compression: gzip, immediateCheckpoint: true }
    retentionPolicy: "30d"
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      shared_buffers: "1GB"
      max_connections: "200"
      log_statement: "ddl"
