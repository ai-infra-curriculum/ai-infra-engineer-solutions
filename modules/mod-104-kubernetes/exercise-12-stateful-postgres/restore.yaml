# Point-in-time recovery: restore to a fresh Cluster.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata: { name: pg-iris-restored, namespace: iris }
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3
  storage: { storageClass: gp3, size: 100Gi }
  bootstrap:
    recovery:
      source: pg-iris
      recoveryTarget:
        targetTime: "2026-05-23 12:00:00.000000+00"
  externalClusters:
    - name: pg-iris
      barmanObjectStore:
        destinationPath: s3://my-backups/pg-iris
        s3Credentials:
          accessKeyId:     { name: aws-creds, key: ACCESS_KEY_ID }
          secretAccessKey: { name: aws-creds, key: SECRET_ACCESS_KEY }
