# Two StorageClasses: gp3 default (fast), gp2 for archival.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations: { storageclass.kubernetes.io/is-default-class: "true" }
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters: { type: gp3, fsType: ext4, encrypted: "true" }
reclaimPolicy: Delete
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata: { name: gp2-cold }
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters: { type: gp2, fsType: ext4, encrypted: "true" }
reclaimPolicy: Retain    # keep cold data even after PVC delete
