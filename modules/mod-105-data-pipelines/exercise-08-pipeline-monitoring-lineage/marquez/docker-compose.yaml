services:
  marquez-db:
    image: postgres:15
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez

  marquez:
    image: marquezproject/marquez:0.46.0
    ports: ["5000:5000", "5001:5001"]
    environment:
      MARQUEZ_DB_HOST: marquez-db
      MARQUEZ_DB_USER: marquez
      MARQUEZ_DB_PASSWORD: marquez
    depends_on: [marquez-db]

  marquez-web:
    image: marquezproject/marquez-web:0.46.0
    ports: ["3000:3000"]
    environment:
      MARQUEZ_HOST: marquez
    depends_on: [marquez]
