# EMR with spot instances + graceful task-node loss handling.
spark.master                          yarn
spark.submit.deployMode               cluster

# Spot task nodes: tolerate eviction
spark.task.maxFailures                10
spark.stage.maxConsecutiveAttempts    8

# Decommission on spot loss
spark.decommission.enabled            true
spark.storage.decommission.enabled    true

# Output committer that survives task failure
spark.sql.sources.partitionOverwriteMode    dynamic
spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version    2

# zstd for storage + scan savings
spark.sql.parquet.compression.codec   zstd

# AQE for free shuffle tuning
spark.sql.adaptive.enabled            true
spark.sql.adaptive.coalescePartitions.enabled    true
