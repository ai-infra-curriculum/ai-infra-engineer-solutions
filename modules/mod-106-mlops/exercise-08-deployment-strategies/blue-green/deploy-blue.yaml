apiVersion: apps/v1
kind: Deployment
metadata: { name: iris-api-blue, labels: { color: blue } }
spec:
  replicas: 6
  selector: { matchLabels: { app: iris-api, color: blue } }
  template:
    metadata: { labels: { app: iris-api, color: blue } }
    spec: { containers: [{ name: api, image: ghcr.io/me/iris-api:0.5 }] }
---
apiVersion: v1
kind: Service
metadata: { name: iris-api }
spec:
  selector: { app: iris-api, color: blue }    # cutover happens here
  ports: [{ port: 80, targetPort: 8000 }]
