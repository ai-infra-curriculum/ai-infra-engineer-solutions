apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: iris-api-secrets, namespace: iris }
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: iris-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef: { key: ml-platform/openai, property: api_key }
    - secretKey: DATABASE_URL
      remoteRef: { key: ml-platform/db,     property: url }
