apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api-gateway
  namespace: llm-serving
  labels:
    app: llm-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-api-gateway
  template:
    metadata:
      labels:
        app: llm-api-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/example/llm-api-gateway:0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: LLAMA2_BACKEND
              value: http://llama2:8000
            - name: MISTRAL_BACKEND
              value: http://mistral:8000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
