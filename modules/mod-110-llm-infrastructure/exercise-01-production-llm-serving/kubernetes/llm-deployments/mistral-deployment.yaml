apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistral
  namespace: llm-serving
  labels:
    app: mistral
    model: mistral-7b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mistral
  template:
    metadata:
      labels:
        app: mistral
        model: mistral-7b
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.4.2
          args:
            - --model=mistralai/Mistral-7B-Instruct-v0.2
            - --tensor-parallel-size=1
            - --port=8000
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 24Gi
            limits:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: 32Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mistral
  namespace: llm-serving
  labels:
    app: mistral
spec:
  selector:
    app: mistral
  ports:
    - name: http
      port: 8000
      targetPort: 8000
